<!DOCTYPE html>
<html>
<head>
  <title>Users - Satguru CRM</title>
</head>

<body style="font-family: Arial; margin: 0;">

  <!-- Header -->
  <div style="background-color: #333; color: white; padding: 15px;">
    <h2>Satguru CRM</h2>
  </div>

  <div style="display: flex;">

    <!-- Sidebar -->
    <div style="width: 220px; background-color: #2c3e50; color: white; padding: 20px; height: 100vh; position: fixed;">
      <h3>CRM</h3>
      <ul style="list-style: none; padding: 0;">
        <li><a href="home.html" style="color:white;">Dashboard</a></li>
        <li><a href="leads.html" style="color:white;">Leads</a></li>
        <li><a href="users.html" style="color:white;">Users</a></li>
        <li>Accounts</li>
        <li>Contacts</li>
      </ul>

      <br>
      <a href="index.html">
        <button>Logout</button>
      </a>
    </div>

    <!-- Main Content -->
    <div style="margin-left: 240px; padding: 20px; width: 100%;">

      <h1>User Manager</h1>

      <!-- Search -->
      <input type="text" id="searchBox" placeholder="Search user..." onkeyup="searchUsers()"><br><br>

      <!-- Add User -->
      <h3>Add / Edit User</h3>

      <form onsubmit="addUser(event)">
        <input type="text" id="userName" placeholder="User Name" required><br><br>

        <input type="email" id="userEmail" placeholder="Email" required><br><br>

        <select id="userRole" required>
          <option value="">Select Role</option>
          <option>Super Admin</option>
          <option>Admin</option>
          <option>Manager</option>
          <option>Sales Executive</option>
          <option>Viewer</option>
        </select><br><br>

        <button type="submit">Save User</button>
      </form>

      <hr>

      <!-- Table -->
      <table border="1" cellpadding="10" cellspacing="0" id="usersTable">
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Role</th>
          <th>Actions</th>
        </tr>

        <tr>
          <td>Admin User</td>
          <td>admin@satguru.com</td>
          <td>Admin</td>
          <td>
            <button type="button" onclick="editUser(this)">Edit</button>
            <button type="button" onclick="deleteUser(this)">Delete</button>
          </td>
        </tr>

        <tr>
          <td>Sales User</td>
          <td>sales@satguru.com</td>
          <td>Sales Executive</td>
          <td>
            <button type="button" onclick="editUser(this)">Edit</button>
            <button type="button" onclick="deleteUser(this)">Delete</button>
          </td>
        </tr>

      </table>

    </div>

  </div>

  <script>

    // ADD USER
    function addUser(event) {
      event.preventDefault();

      var name = document.getElementById("userName").value;
      var email = document.getElementById("userEmail").value;
      var role = document.getElementById("userRole").value;

      var table = document.getElementById("usersTable");
      var newRow = table.insertRow(-1);

      var cell1 = newRow.insertCell(0);
      var cell2 = newRow.insertCell(1);
      var cell3 = newRow.insertCell(2);
      var cell4 = newRow.insertCell(3);

      cell1.innerHTML = name;
      cell2.innerHTML = email;
      cell3.innerHTML = role;

      cell4.innerHTML = `
        <button type="button" onclick="editUser(this)">Edit</button>
        <button type="button" onclick="deleteUser(this)">Delete</button>
      `;

      document.getElementById("userName").value = "";
      document.getElementById("userEmail").value = "";
      document.getElementById("userRole").value = "";
    }

    // DELETE USER
    function deleteUser(button) {
      var row = button.parentNode.parentNode;
      row.remove();
    }

    // EDIT USER
    function editUser(button) {
      var row = button.parentNode.parentNode;

      var name = row.cells[0].innerText;
      var email = row.cells[1].innerText;
      var role = row.cells[2].innerText;

      document.getElementById("userName").value = name;
      document.getElementById("userEmail").value = email;
      document.getElementById("userRole").value = role;

      row.remove();
    }

    // SEARCH USER
    function searchUsers() {
      var input = document.getElementById("searchBox").value.toLowerCase();
      var table = document.getElementById("usersTable");
      var rows = table.getElementsByTagName("tr");

      for (var i = 1; i < rows.length; i++) {
        var name = rows[i].cells[0].innerText.toLowerCase();
        var email = rows[i].cells[1].innerText.toLowerCase();

        if (name.includes(input) || email.includes(input)) {
          rows[i].style.display = "";
        } else {
          rows[i].style.display = "none";
        }
      }
    }

  </script>

</body>
</html>
