<!DOCTYPE html>
<html>
<head>
  <title>Users - Satguru CRM</title>
</head>

<body style="font-family: Arial; margin: 0;">

  <div style="background-color: #333; color: white; padding: 15px;">
    <h2>Satguru CRM</h2>
  </div>

  <div style="display: flex;">

    <div style="width: 200px; background-color: #f4f4f4; padding: 20px; height: 100vh;">
      <h3>Menu</h3>
      <ul style="list-style: none; padding: 0;">
        <li><a href="home.html">Dashboard</a></li>
        <li><a href="leads.html">Leads</a></li>
        <li><a href="users.html">Users</a></li>
        <li>Accounts</li>
        <li>Contacts</li>
      </ul>

      <br>

      <a href="index.html">
        <button>Logout</button>
      </a>
    </div>

    <div style="flex: 1; padding: 20px;">
      <h1>User Manager</h1>
      <p>Here we will manage users.</p>

      <h3>Add New User</h3>

      <form onsubmit="addUser(event)">
        <input type="text" id="userName" placeholder="User Name" required><br><br>

        <input type="email" id="userEmail" placeholder="Email" required><br><br>

        <select id="userRole" required>
          <option value="">Select Role</option>
          <option>Super Admin</option>
          <option>Admin</option>
          <option>Manager</option>
          <option>Sales Executive</option>
          <option>Viewer</option>
        </select><br><br>

        <button type="submit">Add User</button>
      </form>

      <hr>

      <table border="1" cellpadding="10" cellspacing="0" id="usersTable">
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Role</th>
        </tr>
        <tr>
          <td>Admin User</td>
          <td>admin@satguru.com</td>
          <td>Admin</td>
        </tr>
        <tr>
          <td>Sales User</td>
          <td>sales@satguru.com</td>
          <td>Sales Executive</td>
        </tr>
      </table>
    </div>

  </div>

  <script>
    function addUser(event) {
      event.preventDefault();

      var userName = document.getElementById("userName").value;
      var userEmail = document.getElementById("userEmail").value;
      var userRole = document.getElementById("userRole").value;

      var table = document.getElementById("usersTable");
      var newRow = table.insertRow(-1);

      var cell1 = newRow.insertCell(0);
      var cell2 = newRow.insertCell(1);
      var cell3 = newRow.insertCell(2);

      cell1.innerHTML = userName;
      cell2.innerHTML = userEmail;
      cell3.innerHTML = userRole;

      document.getElementById("userName").value = "";
      document.getElementById("userEmail").value = "";
      document.getElementById("userRole").value = "";
    }
  </script>

</body>
</html>
